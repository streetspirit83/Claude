name: Scrape Energy News

on:
  schedule:
    # Every 3h during the day: 04–19 UTC = 06–21 German summer time
    # (05–20 in winter). Note: GitHub's scheduler may delay runs under load.
    - cron: "0 4-19/3 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-energy-news
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run energy news scraper
        run: python scripts/scrape_energy_news.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Ignore the generated_at timestamp when deciding if data changed,
          # so we don't create an empty commit on every run.
          if git diff --quiet -I'"generated_at"' -- energy_news.json; then
            echo "No data changes — skipping commit."
            git checkout -- energy_news.json
          else
            git add energy_news.json
            git commit -m "chore: update energy news data [skip ci]"
            git push
          fi
