name: Scrape AltIndex Toplist

on:
  schedule:
    # Daily at 06:00 UTC. Note: GitHub's scheduler may delay runs under load.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape-toplist
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scripts/scrape_toplist.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Ignore the scraped_at timestamp when deciding if data changed,
          # so we don't create an empty commit on every run.
          if git diff --quiet -I'"scraped_at"' -- altindex_toplist.json; then
            echo "No data changes — skipping commit."
            git checkout -- altindex_toplist.json
          else
            git add altindex_toplist.json
            git commit -m "chore: update AltIndex toplist data [skip ci]"
            git push
          fi
